name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci

    - name: Prisma Generate
      run: npx prisma generate
      
    - name: Lint
      run: npm run lint
      
    - name: Typecheck
      run: npx tsc --noEmit
      
    - name: Test (Vitest with Prisma Mock)
      # Al usar Opción B, no necesitamos un servicio Postgres en GitHub Actions
      run: npm run test -- --run
      
    - name: Build
      # Usamos SQLite (igual que el schema.prisma actual) para que Prisma no falle en CI
      env:
        DATABASE_URL: "file:./dev.db"
        AUTH_SECRET: "ci-placeholder-secret-32chars-minimum"
      run: npm run build
